<svg viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuitPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Circuit lines -->
      <path d="M10 10 L90 10 M50 10 L50 90 M10 50 L90 50" stroke="rgba(59,130,246,0.1)" stroke-width="1" fill="none"/>
      <!-- Circuit nodes -->
      <circle cx="10" cy="10" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="50" cy="10" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="90" cy="10" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="10" cy="50" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="50" cy="50" r="3" fill="rgba(59,130,246,0.3)"/>
      <circle cx="90" cy="50" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="10" cy="90" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="50" cy="90" r="2" fill="rgba(59,130,246,0.2)"/>
      <circle cx="90" cy="90" r="2" fill="rgba(59,130,246,0.2)"/>
    </pattern>

    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(59,130,246,0.05);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.8);stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>

  <!-- Circuit pattern overlay -->
  <rect width="1200" height="800" fill="url(#circuitPattern)"/>

  <!-- Subtle geometric shapes -->
  <g opacity="0.1">
    <polygon points="200,100 300,50 400,100 350,200 250,200" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <polygon points="800,150 900,100 1000,150 950,250 850,250" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <polygon points="600,400 700,350 800,400 750,500 650,500" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.3">
    <circle cx="150" cy="200" r="3" fill="rgba(59,130,246,0.4)"/>
    <circle cx="450" cy="150" r="2" fill="rgba(59,130,246,0.3)"/>
    <circle cx="750" cy="300" r="4" fill="rgba(59,130,246,0.5)"/>
    <circle cx="1050" cy="250" r="2" fill="rgba(59,130,246,0.3)"/>
    <circle cx="350" cy="500" r="3" fill="rgba(59,130,246,0.4)"/>
    <circle cx="850" cy="550" r="2" fill="rgba(59,130,246,0.3)"/>
  </g>
</svg>