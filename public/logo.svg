<svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Arvionixa Text -->
  <text x="10" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#logoGradient)">
    ARVIONIXA
  </text>

  <!-- Tech Icon -->
  <g transform="translate(160, 15)">
    <!-- Circuit pattern -->
    <rect x="0" y="0" width="30" height="30" rx="4" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
    <circle cx="8" cy="8" r="2" fill="url(#logoGradient)"/>
    <circle cx="22" cy="8" r="2" fill="url(#logoGradient)"/>
    <circle cx="8" cy="22" r="2" fill="url(#logoGradient)"/>
    <circle cx="22" cy="22" r="2" fill="url(#logoGradient)"/>
    <line x1="8" y1="8" x2="22" y2="8" stroke="url(#logoGradient)" stroke-width="1"/>
    <line x1="8" y1="22" x2="22" y2="22" stroke="url(#logoGradient)" stroke-width="1"/>
    <line x1="8" y1="8" x2="8" y2="22" stroke="url(#logoGradient)" stroke-width="1"/>
    <line x1="22" y1="8" x2="22" y2="22" stroke="url(#logoGradient)" stroke-width="1"/>
  </g>
</svg>